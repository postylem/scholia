# Scholia's default Quarto style ("scholia" theme).
#
# Passed via `quarto render --metadata-file <this-file>`.
# Document YAML frontmatter overrides anything here.
#
# Style choices mirror scholia's Pandoc/markdown rendering:
# Tufte-inspired serif typography, warm background, muted accents.
#
# Math method is also set via -M flag, but URL override is here
# to ensure MathJax 4 is loaded (Quarto bundles v3 by default).
html-math-method:
  method: mathjax
  url: "https://cdn.jsdelivr.net/npm/mathjax@4/tex-chtml.js"

number-sections: true
mainfont: et-book, Palatino, "Palatino Linotype", "Palatino LT STD", "Book Antiqua", Georgia, serif
monofont: Consolas, "Liberation Mono", Menlo, Monaco, Courier, monospace
fontsize: 1.1rem
backgroundcolor: "#fefefe"
fontcolor: "#111"
linkcolor: "#446677"
