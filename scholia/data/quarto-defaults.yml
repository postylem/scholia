# Quarto render defaults used by scholia.
#
# Passed via `quarto render --defaults <this-file>`.
# Document YAML frontmatter overrides anything here, so these
# act as defaults that authors can customize per-document.
#
# Style choices mirror scholia's Pandoc/markdown rendering:
# Tufte-inspired serif typography, generous line spacing,
# warm near-white background, muted teal accents.
#
# ── Do not change ────────────────────────────────────────────────
# html-math-method: katex is required — scholia's comment system
# loads KaTeX for rendering math in annotations, and the document
# must use the same engine to avoid conflicts.
# ─────────────────────────────────────────────────────────────────

# Processor options (top-level)
html-math-method: katex
number-sections: true

# Template variables (fonts, colors, spacing)
variables:
  mainfont: Palatino, "Palatino Linotype", "Palatino LT STD", "Book Antiqua", Georgia, serif
  monofont: Consolas, "Liberation Mono", Menlo, Monaco, Courier, monospace
  fontsize: 1.1rem
  linestretch: 1.7
  backgroundcolor: "#fefefe"
  fontcolor: "#111"
  linkcolor: "#446677"
